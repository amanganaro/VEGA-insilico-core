# root logger
log4j.rootLogger=DEBUG, F1

# root logger FILE appender with pattern layout
log4j.appender.F1=org.apache.log4j.RollingFileAppender
log4j.appender.F1.File=log/log.txt
log4j.appender.F1.MaxFileSize=250KB
log4j.appender.F1.MaxBackupIndex=5
log4j.appender.F1.layout=org.apache.log4j.PatternLayout
log4j.appender.F1.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %5p (%F:%L) - %m%n


