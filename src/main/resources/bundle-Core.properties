sa_benigni_bossa_rule_append=Aromatic nitroso group. However, the following structures should be excluded:
sa_benigni_bossa_sa25_name=Aromatic nitroso group
#sa_benigni_bossa_sa25_description=
sa_benigni_bossa_sa26_name=Aromatic ring N-oxide
sa_benigni_bossa_sa26_description=Aromatic ring N-oxide
sa_benigni_bossa_sa27_name=Nitro aromatic
sa_benigni_bossa_sa27_description=Nitro aromatic. However: Aromatic nitro groups with ortho-disubstitution or with a carboxylic acid substituent in ortho position should be excluded. Please note that a molecule like this <b>CC1=CC=CC(=C1[N+](=O)[O-])[N+](=O)[O-]</b> should be included in the alert: one of the two nitro groups is ortho disubstituted, but the other one is ortho-monosubstituted. Also the following molecule <b>CC2=CC=CC(CCC1=CC=CC(=C1)[N+](=O)[O-])=C2[N+](=O)[O-]</b> Should fire the alert (one nitro group is ortho disubstituted, but the other is not). If a sulfonic acid group (-SO3H) is present on the ring that contains also the nitro group, the substance should be excluded.
sa_benigni_bossa_sa28_name=Primary aromatic amine, hydroxyl amine and its derived esters (with restrictions)
sa_benigni_bossa_sa28_description=Primary aromatic amine, hydroxyl amine and its derived esters (with restrictions). However: Aromatic amino groups with ortho disubstitutions or with a carboxylic acid substituent in ortho position are excluded. If a sulfonic acid group (-SO3H) is present on the ring that contains also the amino group, the substance should be excluded from the alert. The following structures should also be included: O=C=NC1=CC=CC=C1 and C([H])([H])=NC1=CC=CC=C1. The possibility that the Nitrogen atom of hydroxyl amine is part of a cycle, should be excluded.
sa_benigni_bossa_sa28_amines_rule1=Primary amine
sa_benigni_bossa_sa28_amines_rule2=Hydroxyl amine
sa_benigni_bossa_sa28_amines_rule3=Hydroxyl amine ester
sa_benigni_bossa_sa28bis_amines_rule1=Aromatic mono- and dialkylamine
sa_benigni_bossa_sa28bis_name=Aromatic mono- and dialkylamine
sa_benigni_bossa_sa28bis_description=Mono- or di- methyl or ethyl aromatic amines, are included. However:Aromatic amino groups with ortho-disubstitution or with a carboxylic acid substituent in ortho position should be excluded. If a sulfonic acid group (-SO3H) is present on the ring that contains also the amino group, the substance should be excluded from the alert.
sa_benigni_bossa_sa28ter_name=Aromatic N-acyl amine
sa_benigni_bossa_sa28ter_description=Aromatic N-acyl amine. However: Aromatic amino groups with ortho-disubstitution or with a carboxylic acid substituent in ortho position should be excluded. If a sulfonic acid group (-SO3H) is present on the ring that contains also the amino group, the substance should be excluded from the alert.
sa_benigni_bossa_sa29_name=Aromatic diazo
sa_benigni_bossa_sa29_description=Aromatic diazo. If a sulfonic acid group (-SO3H) is present on each of the rings that contain the diazo group, the substance should be not classified.
