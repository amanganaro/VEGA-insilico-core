sa_benigni_bossa_additional_sa57_name=DNA Intercalating Agents with a basic side chain
sa_benigni_bossa_additional_sa57_description=DNA intercalating agents are defined as those compounds that are able to insert partially or completely between adjacent DNA base pairs.
sa_benigni_bossa_additional_sa58_name=Haloalkene cysteine S-conjugates
sa_benigni_bossa_additional_sa58_description=Haloalkene cysteine S-conjugates. These substances are reactive metabolites generated in the course of  the activation process of toxic and carcinogenic haloalkenes.
sa_benigni_bossa_additional_sa59_name=Xanthones, Thioxanthones, Acridones
sa_benigni_bossa_additional_sa59_description=Xanthones, Thioxanthones, Acridones. DNA intercalating agents are defined as those compounds that are able to insert partially or completely between adjacent DNA base pairs. Fused polycyclic chemicals are classical members of this class of compounds.
sa_benigni_bossa_additional_sa60_name=Flavonoids
sa_benigni_bossa_additional_sa60_description=Flavonoids. Quercetin-type flavonoids are recognized as a class of epigenetic carcinogens acting via induction of oxidative stress.
sa_benigni_bossa_additional_sa61_name=Alkyl hydroperoxides
sa_benigni_bossa_additional_sa61_description=Alkyl hydroperoxides. Hydroperoxides are able to promote extensive biomolecular damage.
sa_benigni_bossa_additional_sa62_name=N-acyloxy-N -alkoxybenzamides
sa_benigni_bossa_additional_sa62_description=N-Acyloxy-N-alkoxybenzamides have been shown to be mutagenic in Salmonella typhimurium without the need of metabolic activation.
sa_benigni_bossa_additional_sa63_name=N-aryl-N-acetoxyacetamides
sa_benigni_bossa_additional_sa63_description=N-aryl-N-acetoxyacetamides are reactive molecules generated in the metabolic activation process of aromatic amines in vivo.
sa_benigni_bossa_additional_sa64_name=Hydroxamic acid derivatives
sa_benigni_bossa_additional_sa64_description=Hydroxamic acid derivatives are potential DNA acylating agents after metabolic transformation.
sa_benigni_bossa_additional_sa65_name=Halofuranones
sa_benigni_bossa_additional_sa65_description=Halofuranones are direct-acting bacterial mutagens that are found - together with other class of halo compounds- as disinfection by-products in drinking water.
sa_benigni_bossa_additional_sa66_name=Anthrones
sa_benigni_bossa_additional_sa66_description=Anthrones are supposed to act as DNA intercalating agents. These are defined as those compounds that are able to insert partially or completely between adjacent DNA base pairs.
sa_benigni_bossa_additional_sa67_name=Triphenylimidazole and related
sa_benigni_bossa_additional_sa67_description=Triphenylimidazole and related. DNA intercalating agents are defined as those compounds that are able to insert partially or completely between adjacent DNA base pairs.
sa_benigni_bossa_additional_sa68_name=9,10 - dihydrophenanthrenes
sa_benigni_bossa_additional_sa68_description=9,10 - dihydrophenanthrenes. DNA intercalating agents are defined as those compounds that are able to insert partially or completely between adjacent DNA base pairs.
sa_benigni_bossa_additional_sa69_name=Fluorinated quinolines
sa_benigni_bossa_additional_sa69_description=Fluorinated quinolines. Quinoline and many substituted quinolines have been reported to be mutagenic.

