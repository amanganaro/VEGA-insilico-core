sa_bcf_caesar_rules = Rules for outliers and moieties for Caesar BCF model
sa_bcf_caesar_frag_name_0=6 Cl atoms in the molecule (SO 01)
sa_bcf_caesar_frag_description_0=Compounds with six or more Cl atoms fall into a chemical category that results out of the applicability domain of the model.
sa_bcf_caesar_frag_name_1=2 t-butyl linked to aromatic (SO 02)
sa_bcf_caesar_frag_description_1=Compounds with two or more t-butyl linked to aromatic ring fall into a chemical category that results out of the applicability domain of the model.
sa_bcf_caesar_frag_name_2=Si atom in the molecule (SO 03)
sa_bcf_caesar_frag_description_2=Compounds with Si atoms fall into a chemical category that results out of the applicability domain of the model.
sa_bcf_caesar_frag_name_3=Sn atom in the molecule  (SO 04)
sa_bcf_caesar_frag_description_3=Compounds with Sn atoms fall into a chemical category that results out of the applicability domain of the model.
sa_bcf_caesar_frag_name_4=O linked to aromatic and 3 Br/Cl linked to aromatic  (SO 05)
sa_bcf_caesar_frag_description_4=Compounds with one or more O atoms linked to aromatic ring and three or more Br or Cl atoms linked to aromatic ring fall into a chemical category that results out of the applicability domain of the model.
sa_bcf_caesar_frag_name_5=Azo group liked to aromatic (SO 06)
sa_bcf_caesar_frag_description_5=Compounds with one or more azo groups liked to aromatic rings fall into a chemical category that results out of the applicability domain of the model.
sa_bcf_caesar_frag_name_6=3 Nitro-groups linked to aromatic (SO 07)
sa_bcf_caesar_frag_description_6=Compounds with three or more nitro-groups linked to Ar fall into a chemical category that results out of the applicability domain of the model.
sa_bcf_caesar_frag_name_7=Peroxide (SO 08)
sa_bcf_caesar_frag_description_7=Compounds with one or more peroxide fall into a chemical category that results out of the applicability domain of the model.
sa_bcf_caesar_frag_name_8=Phosphinothioyl-oxy-imino (SO 09)
sa_bcf_caesar_frag_description_8=Compounds with one or more phosphinothioyl-oxy-imino fall into a chemical category that results out of the applicability domain of the model.
sa_bcf_caesar_frag_name_9=10 F atoms in the molecule (SO 10)
sa_bcf_caesar_frag_description_9=Compounds with ten or more F atoms fall into a chemical category that results out of the applicability domain of the model.
sa_bcf_caesar_frag_name_10=Phosphorodithioate (SO 11)
sa_bcf_caesar_frag_description_10=Compounds with one or more phosphorodithioate fall into a chemical category that results out of the applicability domain of the model.
sa_bcf_caesar_frag_name_11=Moiety (SMILES: O=Cc1ccccc1) (SR 01)
sa_bcf_caesar_frag_description_11=This chemical contains a moiety defined by SMILES O=Cc1ccccc1, which has been found only in non-bioaccumulative compounds (24 chemicals), even when the logP value was higher than 3.
sa_bcf_caesar_frag_name_12=Carbonyl residue (SR 02)
sa_bcf_caesar_frag_description_12=This chemical contains a carbonyl residue. This residue has been found to be present in a very large (112) number of non-bioaccumulative compounds, even when the logP value was higher than 3.
sa_bcf_caesar_frag_name_13=PO2 residue (SR 03)
sa_bcf_caesar_frag_description_13=This chemical contains the O-P=O residue, which has been found only in non-bioaccumulative compounds (45 chemicals), even when the logP value was higher than 3.
sa_bcf_caesar_frag_name_14=Thiobenzene residue (SR 04)
sa_bcf_caesar_frag_description_14=This chemical contains the thiobenzene residue, which has been found only in non-bioaccumulative compounds (39 chemicals), even when the logP value was higher than 3.
sa_bcf_caesar_frag_name_15=Tertiary amine (SR 05)
sa_bcf_caesar_frag_description_15=This chemical contains a tertiary amine. This residue has been found to be present in a large numberof non-bioaccumulative compounds (28), even when the logP value was higher than 3.
sa_bcf_caesar_frag_name_16=Triazole ring (SR 06)
sa_bcf_caesar_frag_description_16=This chemical contains a triazole ring. This residue has been found to be present in a number of non- bioaccumulative compounds (16), even when the logP value was higher than 3.
sa_bcf_caesar_frag_name_17=Moiety (SMILES: Clc1ccccc1c1ccc(Cl)cc1) (SR 07)
sa_bcf_caesar_frag_description_17=This chemical contains a moiety defined by SMILES Clc1ccccc1c1ccc(Cl)cc1), which has been found only in bioaccumulative compounds (15 chemicals). The high lipophylicity of this moiety increases the bioaccumulative behavior.
sa_bcf_caesar_frag_name_18=Moiert (SMILES: C1cc(Oc2ccccc2)ccc1Cl) (SR 08)
sa_bcf_caesar_frag_description_18=This chemical contains a moiety defined by SMILES C1cc(Oc2ccccc2)ccc1Cl, which has been found only in bioaccumulative compounds (9 chemicals). The high lipophylicity of this moiety increases the bioaccumulative behavior.
sa_bcf_caesar_frag_name_19=Moiety (SMILES: Clc1cc(c2ccccc2)c(Cl)cc1) (SR 09)
sa_bcf_caesar_frag_description_19=This chemical contains a moiety defined by SMILES Clc1cc(c2ccccc2)c(Cl)cc1, which has been found only in bioaccumulative compounds (15 chemicals). The high lipophylicity of this moiety increases the bioaccumulative behavior.
sa_bcf_caesar_frag_name_20=COOH group (PG 01)
sa_bcf_caesar_frag_description_20=This chemical contains a COOH polar group.
sa_bcf_caesar_frag_name_21=SO3H group (PG 02)
sa_bcf_caesar_frag_description_21=This chemical contains a SO3H polar group. 
sa_bcf_caesar_frag_name_22=PO3 group (PG 03)
sa_bcf_caesar_frag_description_22=This chemical contains a PO3 polar group. 
sa_bcf_caesar_frag_name_23=PO2S group (PG 04)
sa_bcf_caesar_frag_description_23=This chemical contains a PO2S polar group. 
sa_bcf_caesar_frag_name_24=POS2 group (PG 05)
sa_bcf_caesar_frag_description_24=This chemical contains a POS2 polar group. 
sa_bcf_caesar_frag_name_25=OH group (PG 06)
sa_bcf_caesar_frag_description_25=This chemical contains a OH polar group. 
sa_bcf_caesar_frag_name_26=NH2 group (PG 07)
sa_bcf_caesar_frag_description_26=This chemical contains a NH2 polar group. 
sa_bcf_caesar_frag_name_27=CS2 group (PG 08)
sa_bcf_caesar_frag_description_27=This chemical contains a CS2 polar group. 
