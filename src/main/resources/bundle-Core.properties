#TEXT CONSTANTS FOR MODEL GUIDE GENERATOR
tc_guide_descriptors_range_title=Model descriptors range check.
tc_guide_descriptors_range_intro=This index checks if the descriptors calculated for the predicted compound are inside the range of descriptors of the training and test set. The index has value 1 if alldescriptors are inside the range, 0 if at least one descriptor is out of the range. Defined intervals are:
tc_guide_ad_intro=The applicability domain of predictions is assessed using an Applicability Domain Index (ADI) that has values from 0 (worst case) to 1 (best case). The ADI is calculated by grouping several other indices, each one taking into account a particular issue of the applicability domain. Most of the indices are based on the calculation of the most similar compounds found in the training and test set of the model, calculated by a similarity index that consider molecule's fingerprint and structural aspects (count of atoms, rings and relevant fragments).\nFor each index, including the final ADI, three intervals for its values are defined, such that the first interval corresponds to a positive evaluation, the second one corresponds to a suspicious evaluation  and the last one corresponds to a negative evaluation.\nFollowing, all applicability domain components are reported along with their explanation and the intervals used.
tc_guide_similarmol_title=Similar molecules with known experimental value.
tc_guide_similarmol_intro=This index takes into account how similar are the first two most similar compounds found. Values near 1 mean that the predicted compound is well represented in the dataset used to build the model, otherwise the prediction could be an extrapolation. Defined intervals are:
tc_guide_accuracy_daphniademetra_title=Accuracy (average error) of prediction for similar molecules.
tc_guide_accuracy_daphniademetra_intro=This index takes into account the error in prediction for the two most similar compounds found. Values near 0 mean that the predicted compounds falls in an area of the model's space where the model gives reliable predictions, otherwise the greater is the value, the worse the model behaves. Defined intervals are:
tc_guide_accuracy_title=Accuracy of prediction for similar molecules.
tc_guide_accuracy_intro=This index takes into account the classification\npredicted compounds falls in an area of the model's space where the model gives reliable predictions\naccuracy in prediction for the two most similar compounds found. Values near 1 mean that the\n(no misclassifications), otherwise the lower is the value, the worse the model behaves. Defined\nintervals are:
tc_guide_reliability_title=Model assignment reliability.
tc_guide_reliability_intro=This index checks if the two neural network output values (positive\nand non-positive) lead to an unreliable prediction; when the difference between these two values is\nlower than 0.1, the neuron where the predicted compound falls can not provide a good classification,\nthus the index is set to 0. Otherwise the index is set to 1.
tc_guide_nnm_concordance_title=Neural map neurons concordance.
tc_guide_nnm_concordance_intro=This index checks the concordance of the predicted compound with the experimental values of the other compounds that falls int the same neuron. The index is built considering two sub-indices: Population (the number of compounds found in the neuron) and Concordance (the number of compounds in the neuron that have experimental value matching with current prediction divided by the number of compounds in the neuron). Low values mean that the predicted compound falls in a zone of the neural network that has no experimental compounds, or that has experimental compounds with eterogeneous experimental values, thus leading to a low reliability of the prediction. 
tc_guide_concordance_title=Concordance with similar molecules (average difference between target compound prediction and experimental values of similar molecules)
tc_guide_concordance_intro=This index takes into account the difference between the predicted value and the experimental values of the two most similar compounds. Values near 0 mean that the prediction made agrees with the experimental values found in the model's space, thus the prediction is reliable. Defined intervals are: 
tc_guide_max_error_pred_title=Maximum error of prediction among similar molecules.
tc_guide_max_error_pred_intro=This index takes into account the maximum error in prediction among the two most similar compounds. Values near 0 means that the predicted compounds falls in an area of the model's space where the model gives reliable predictions without any outlier value. Defined intervals are:
tc_guide_acf_title=Atom Centered Fragments similarity check.
tc_guide_acf_intro="This index takes into account the presence of one or more fragments that aren't found in the training set, or that are rare fragments. First order atom centered fragments from all molecules in the training set are calculated, then compared with the first order atom centered fragments from the predicted compound; then the index is calculated as following: a first index RARE takes into account rare fragments (those who occur less than three times in the training set), having value of 1 if no such fragments are found, 0.85 if up to 2 fragments are found, 0.7 if more than 2 fragments are found; a second index NOTFOUND takes into account not found fragments, having value of 1 if no such fragments are found, 0.6 if a fragments is found, 0.4 if more than 1 fragment is found. Then, the final index is given as the product RARE * NOTFOUND. Defined intervals are:
tc_guide_desc_range_check_title=Model descriptors range check.
tc_guide_desc_range_check_intro=This index checks if the descriptors calculated for the predicted compound are inside the range of descriptors of the training and test set. The index has value 1 if all descriptors are inside the range, 0 if at least one descriptor is out of the range. Defined intervals are:
tc_guide_global_ad_index_title=Global AD Index.
tc_guide_global_ad_index_intro=The final global index takes into account all the previous indices, in order to give a general global assessment on the applicability domain for the predicted compound. Defined intervals are:
tc_guide_struct_alert_concordance_title=Structural alert concordance
tc_guide_struct_alert_concordance_intro=This index takes into account the concordance between the prediction provided by the k-NN model and the alerts found. Defined values are: 
tc_guide_logp_reliability_title=LogP reliability
tc_guide_logp_reliability_intro=This index takes into account the reliability of the logP value used in the model. Note that the Meylan BCF model is strongly based on the logP prediction of the compound, thus this index is highly relevant for the assessment of the final prediction. The reliability of the logP value comes from the assessment of the VEGA LogP model (that provides the used logP value), which is also provided in the 'Prediction summary' section of the report. Defined intervals are:
tc_guide_stats_intro=Following, statistics obtained applying the model to its original dataset:
tc_guide_null=No information available.
tc_model_guide_ad_intervals=Defined intervals are:
tc_model_guide_input_general=The model accepts as input two molecule formats: SDF (multiple MOL file) and SMILES. All molecules found as input are preprocessed before the calculation of molecular descriptors, in order to obtain a standardized representation of compound. For this reason, some cautions should be taken.\n- Hydrogen atoms. In SDF files, hydrogen atoms should be explicit. As some times SDF file store only skeleton atoms, and hydrogen atoms are implicit, during the processing of the molecule the system tries to add implicit hydrogens on the basis of the known standard valence of each atom (for example, if a carbon atoms has three single bonds, an hydrogen atom will be added such to reach a valence of four). In SMILES molecules, the default notation uses implicit hydrogen. Anyway please note that in some cases it is necessary to explicitly report an hydrogen; this happens when the conformation is not unambiguous. For example, when a nitrogen atom is into an aromatic ring with a notation like \"cnc\" it is not clear whether it corresponds to C-N=C or to C-[NH]-C, thus if the situation is the latter, it should be explicitly reported as \"c[nH]c\".\n- Aromaticity. The system calculates aromaticity using the basic Hueckel rule. Note that each software for drawing and storing of molecules can use different approaches to aromaticity (for instance, commonly the user can choose between the basic Hueckel rule and a loose approach that lead to considering aromatic a greater number of rings). As in the input files aromaticity can be set explicitly (for instance, in SMILES format by using lowercase letters), during the processing of the molecule the system removes aromaticity from rings that don't satisfy the Hueckel rule. Please note that when aromaticity is removed from a ring, it is not always possible to rebuild the original structure in Kekule form (i.e. with an alternation of single and double bonds, like in the SMILES for benzene, C=1C=CC=CC1), in this case all bonds are set to single. Furthermore, please note that aromaticity detection is a really relevant issue, some molecular descriptors can have significantly different values whether a ring is perceived as aromatic or not. For this reason it is strongly recommended:\n- Always use explicit hydrogens in SDF file.\n- Avoid explicit aromaticity notation in original files; in this way, the perception of aromaticity is left to the preprocessing step and there is no chance of mistakes due to the transformation of rings that were set to aromatic in the original format but not recognized as aromatic in VEGA.\nNote that when some modification of the molecule are performed during the preprocessing (e.g. adding of lacking hydrogens, correction of aromaticity), a warning is given in the remark field of the results.
tc_model_guide_output_general=Results given as text file consist of a plain-text tabbed file (easily importable and processable by any spreadsheet software) containing in each row all the information about the prediction of a molecule. Note that if some problems were encountered while processing the molecule structure, some warning are reported in the last field (Remarks). \nResults given as PDF file consists of a document containing all the information about the prediction. For each molecule, results are organized in sections with the following order:
tc_model_output_3_1=Here it is reported the list of the six most similar compounds found in the training and test set of the model, along with their depiction and relevant information (mainly experimental value and predicted value).
tc_model_output_3_2=Here it is reported the list of all Applicability Domain scores, starting with the global Applicability Domain Index (ADI). Note that the final assessment on prediction reliability is given on the basis of the value of the ADI. For each index, it is reported its value and a brief explanation of the meaning of that value.
tc_model_output_4_1=If some rare and/or missing Atom Centered Fragments are found, they are reported here with a depiction of each fragment.\nIf some relevant fragments are found, they are reported here (one for each page) with a brief explanation of their meaning and the list of the three most similar compounds that contain the same fragment. Note that if no relevant fragments are found, this section is not shown.
